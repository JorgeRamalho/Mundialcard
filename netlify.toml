[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/documents/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/documents/ficha-cadastro-convenio-familiar.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "attachment; filename=\"ficha-cadastro-convenio-familiar.pdf\""

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
