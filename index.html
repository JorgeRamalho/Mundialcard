<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- live-server-redirect -->
    <script>
      (function () {
        var port = location.port;
        if (port === "5173" || port === "4173" || port === "5500") return;
        if (/[/\\]dist[/\\]/i.test(location.pathname)) return;
        location.replace("dist/index.html");
      })();
    </script>
    <!-- /live-server-redirect -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="MundialCard — Seu cartão de super benefícios. Saúde, alimentação, lazer, academia, telemedicina e proteção familiar em um só lugar." />
    <meta name="theme-color" content="#8C1417" />
    <meta property="og:title" content="MundialCard | Seu cartão de super benefícios" />
    <meta property="og:description" content="Benefícios que cabem na vida real. Planos digitais, telemedicina e suporte nacional." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <title>MundialCard | Seu cartão de super benefícios</title>
  </head>
  <body>
    <div id="root"></div>
    <div
      id="site-access-hint"
      role="alert"
      hidden
      style="font-family:system-ui,sans-serif;max-width:28rem;margin:4rem auto;padding:1.5rem;border-radius:12px;background:#fff;border:1px solid rgba(140,20,23,.15);color:#1e293b;line-height:1.6;box-shadow:0 8px 24px rgba(140,20,23,.08)"
    >
      <strong style="color:#8c1417">Site não carregou?</strong>
      Este projeto usa React. Para ver o site completo, execute no terminal:
      <code style="display:block;margin:.75rem 0;padding:.65rem .85rem;background:#f7f4ee;border-radius:8px;font-size:.9rem">npm start</code>
      Ou, para desenvolvimento com atualização automática:
      <code style="display:block;margin:.75rem 0;padding:.65rem .85rem;background:#f7f4ee;border-radius:8px;font-size:.9rem">npm run dev</code>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      setTimeout(function () {
        var root = document.getElementById("root");
        var hint = document.getElementById("site-access-hint");
        if (hint && root && !root.innerHTML.trim()) {
          hint.hidden = false;
        }
      }, 2500);
    </script>
  </body>
</html>
